<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects &mdash; Dongcheng Cang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <div class="container">
      <a href="index.html" class="logo">&gt; dongcheng<span>.cang</span></a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html" class="active">Projects</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <h1>Projects</h1>
      <p>A collection of academic and personal projects in computational health and biomedical engineering.</p>
    </div>
  </div>

  <!-- Filter Banner (shown when arriving from Skills page) -->
  <div id="filter-banner" class="filter-banner" style="display:none;">
    <div class="container">
      <span>Showing projects for: <strong id="filter-label"></strong></span>
      <a href="projects.html" class="filter-clear">Clear filter &times;</a>
    </div>
  </div>

  <!-- Blog Feed -->
  <section>
    <div class="container">
      <div id="blog-feed" class="blog-feed"></div>
    </div>
  </section>

  <!-- Other Projects -->
  <section id="other-projects-section" style="display:none;">
    <div class="container">
      <div class="section-header">
        <h2>Other Projects</h2>
      </div>
      <div class="card-grid" id="other-grid"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Dongcheng Cang &middot; <span class="mono">Built with care, thanks to Claude</span></p>
    </div>
  </footer>

  <script>
    (function () {
      var skill = new URLSearchParams(window.location.search).get('skill');

      fetch('data/projects.json')
        .then(function (r) { return r.json(); })
        .then(function (projects) {
          var featured = projects.filter(function (p) { return p.featured; });
          var other = projects.filter(function (p) { return !p.featured; });

          // Render featured as blog posts
          var feed = document.getElementById('blog-feed');
          feed.innerHTML = featured.map(function (p) {
            var matches = skill && p.skills.some(function (s) {
              return s.toLowerCase() === skill.toLowerCase();
            });
            var cls = skill ? (matches ? 'highlighted' : 'dimmed') : '';
            var d = p.details || {};

            var badgeCls = p.status === 'In Progress' ? 'status-inprogress' : p.status === 'Internship' ? 'status-internship' : p.status === 'Community' ? 'status-community' : 'status-class';
            var badgeHTML = p.status ? '<span class="status-badge ' + badgeCls + '">' + p.status + '</span>' : '';

            var tagsHTML = p.tags.map(function (t) {
              return '<span class="tag">' + t + '</span>';
            }).join('');

            // Media section
            var mediaHTML = '';
            if (d.media) {
              if (d.media.type === 'placeholder') {
                mediaHTML = '<div class="blog-media-placeholder"><p class="muted mono">' + d.media.caption + '</p></div>';
              } else if (d.media.type === 'video') {
                mediaHTML = '<div class="blog-media"><video controls><source src="' + d.media.src + '"></video><p class="muted">' + (d.media.caption || '') + '</p></div>';
              } else if (d.media.type === 'image') {
                mediaHTML = '<div class="blog-media"><img src="' + d.media.src + '" alt="' + (d.media.caption || '') + '"><p class="muted">' + (d.media.caption || '') + '</p></div>';
              }
            }

            // Links section
            var linksHTML = '';
            if (d.links && d.links.length > 0) {
              linksHTML = '<div class="blog-section"><h4>Links</h4><ul class="modal-links">' +
                d.links.map(function (l) {
                  return '<li><a href="' + l.url + '" target="_blank" rel="noopener">' + l.label + ' &rarr;</a></li>';
                }).join('') + '</ul></div>';
            }

            return [
              '<article class="blog-post ' + cls + '" data-skills="' + p.skills.join(',') + '">',
              '  <div class="blog-post-header">',
              '    ' + badgeHTML,
              '    <h2>' + p.title + '</h2>',
              '    <div class="card-tags">' + tagsHTML + '</div>',
              '  </div>',
              mediaHTML,
              '  <div class="blog-section"><h4>Overview</h4><p>' + (d.overview || p.description) + '</p></div>',
              d.approach ? '  <div class="blog-section"><h4>Approach</h4><p>' + d.approach + '</p></div>' : '',
              d.outcomes ? '  <div class="blog-section"><h4>Outcomes</h4><p>' + d.outcomes + '</p></div>' : '',
              linksHTML,
              '</article>'
            ].join('\n');
          }).join('\n');

          // Render other projects as compact cards
          if (other.length > 0) {
            document.getElementById('other-projects-section').style.display = '';
            var otherGrid = document.getElementById('other-grid');
            otherGrid.innerHTML = other.map(function (p) {
              var matches = skill && p.skills.some(function (s) {
                return s.toLowerCase() === skill.toLowerCase();
              });
              var cls = skill ? (matches ? 'highlighted' : 'dimmed') : '';
              var badgeCls = p.status === 'In Progress' ? 'status-inprogress' : p.status === 'Internship' ? 'status-internship' : p.status === 'Community' ? 'status-community' : 'status-class';
              var badgeHTML = p.status ? '<span class="status-badge ' + badgeCls + '">' + p.status + '</span>' : '';
              var tagsHTML = p.tags.map(function (t) {
                return '<span class="tag">' + t + '</span>';
              }).join('');

              return [
                '<div class="card ' + cls + '" data-skills="' + p.skills.join(',') + '">',
                '  ' + badgeHTML,
                '  <h3>' + p.title + '</h3>',
                '  <p>' + p.description + '</p>',
                '  <div class="card-tags">' + tagsHTML + '</div>',
                '</div>'
              ].join('\n');
            }).join('\n');
          }

          if (skill) {
            document.getElementById('filter-banner').style.display = 'block';
            document.getElementById('filter-label').textContent = skill;
          }
        })
        .catch(function () {
          document.getElementById('blog-feed').innerHTML = '<p class="muted">Could not load projects. Try opening this page via a local server or GitHub Pages.</p>';
        });
    })();
  </script>

</body>
</html>
