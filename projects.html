<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects &mdash; Dongcheng Cang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <div class="container">
      <a href="index.html" class="logo">&gt; dongcheng<span>.cang</span></a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html" class="active">Projects</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <h1>Projects</h1>
      <p>A collection of academic and personal projects in computational health and biomedical engineering.</p>
    </div>
  </div>

  <!-- Filter Banner (shown when arriving from Skills page) -->
  <div id="filter-banner" class="filter-banner" style="display:none;">
    <div class="container">
      <span>Showing projects for: <strong id="filter-label"></strong></span>
      <a href="projects.html" class="filter-clear">Clear filter &times;</a>
    </div>
  </div>

  <!-- Project Grid -->
  <section>
    <div class="container">
      <div class="card-grid" id="project-grid"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Dongcheng Cang &middot; <span class="mono">Built with care</span></p>
    </div>
  </footer>

  <script>
    (function () {
      const skill = new URLSearchParams(window.location.search).get('skill');
      const grid = document.getElementById('project-grid');

      fetch('data/projects.json')
        .then(function (r) { return r.json(); })
        .then(function (projects) {
          grid.innerHTML = projects.map(function (p) {
            const matches = skill && p.skills.some(function (s) {
              return s.toLowerCase() === skill.toLowerCase();
            });
            const cls = skill ? (matches ? 'highlighted' : 'dimmed') : '';
            const tagsHTML = p.tags.map(function (t) {
              return '<span class="tag">' + t + '</span>';
            }).join('');
            const badgeCls = p.status === 'In Progress' ? 'status-inprogress' : p.status === 'Internship' ? 'status-internship' : 'status-class';
            const badgeHTML = p.status ? '<span class="status-badge ' + badgeCls + '">' + p.status + '</span>' : '';
            return [
              '<div class="card ' + cls + '" data-skills="' + p.skills.join(',') + '">',
              '  ' + badgeHTML,
              '  <h3>' + p.title + '</h3>',
              '  <p>' + p.description + '</p>',
              '  <div class="card-tags">' + tagsHTML + '</div>',
              '  <a href="' + p.link + '" class="card-link">Read more &rarr;</a>',
              '</div>'
            ].join('\n');
          }).join('\n');

          if (skill) {
            document.getElementById('filter-banner').style.display = 'block';
            document.getElementById('filter-label').textContent = skill;
          }
        })
        .catch(function () {
          grid.innerHTML = '<p class="muted">Could not load projects. Try opening this page via a local server or GitHub Pages.</p>';
        });
    })();
  </script>

</body>
</html>
