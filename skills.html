<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills &mdash; Dongcheng Cang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <div class="container">
      <a href="index.html" class="logo">&gt; dongcheng<span>.cang</span></a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="skills.html" class="active">Skills</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <div class="hero-label">// skills</div>
      <h1>Skills</h1>
      <p>
        A summary of my technical skills. Click any skill to see the
        projects that use it.
      </p>
    </div>
  </div>

  <div id="skills-container"></div>

  <script>
    fetch('data/skills.json')
      .then(function (r) { return r.json(); })
      .then(function (categories) {
        document.getElementById('skills-container').innerHTML = categories.map(function (cat) {
          const pillsHTML = cat.skills.map(function (s) {
            return '<a href="projects.html?skill=' + encodeURIComponent(s) + '" class="skill-pill">' + s + '</a>';
          }).join('');
          return [
            '<section>',
            '  <div class="container">',
            '    <div class="section-header"><h2>' + cat.category + '</h2></div>',
            '    <div class="skill-pills">' + pillsHTML + '</div>',
            '  </div>',
            '</section>'
          ].join('\n');
        }).join('\n');
      })
      .catch(function () {
        document.getElementById('skills-container').innerHTML =
          '<section><div class="container"><p class="muted">Could not load skills. Try opening via a local server or GitHub Pages.</p></div></section>';
      });
  </script>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Dongcheng Cang &middot; <span class="mono">Built with care, thanks to Claude</span></p>
    </div>
  </footer>

</body>
</html>
